<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 70" width="300" height="70">
  <!-- Orange accent above the "i" (measured: i spans x≈80-96) -->
  <rect x="80" y="2" width="18" height="12" rx="2" fill="#F59E0B"/>
  <!-- Light gray outline -->
  <text
    x="6" y="62"
    font-family="Inter, Arial Black, 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="58"
    letter-spacing="-1"
    fill="#EDEAE8"
    stroke="#EDEAE8"
    stroke-width="10"
    stroke-linejoin="round"
    paint-order="stroke">SuiLun</text>
  <!-- Dark gray fill -->
  <text
    x="6" y="62"
    font-family="Inter, Arial Black, 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="58"
    letter-spacing="-1"
    fill="#555555">SuiLun</text>
</svg>
